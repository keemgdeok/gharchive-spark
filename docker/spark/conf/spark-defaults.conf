# 기본 Spark 설정
spark.master                     spark://spark-master:7077
spark.eventLog.enabled           true
spark.eventLog.dir               file:///opt/spark/event-logs
spark.eventLog.compress          true
spark.history.fs.logDirectory    file:///opt/spark/event-logs
spark.history.fs.cleaner.enabled true
spark.history.fs.cleaner.interval 1d
spark.history.fs.cleaner.maxAge  14d
spark.sql.warehouse.dir          /opt/spark/warehouse
spark.local.dir                  /opt/spark/work-dir
spark.sql.session.timeZone       UTC
spark.sql.sources.partitionOverwriteMode dynamic
spark.sql.columnNameOfCorruptRecord _corrupt_record

# AQE 및 튜닝
spark.sql.adaptive.enabled                   true
spark.sql.adaptive.coalescePartitions.enabled true
spark.sql.shuffle.partitions                 18
spark.sql.adaptive.skewJoin.enabled             true
spark.sql.autoBroadcastJoinThreshold         -1

# 원격 Driver 아키텍처용 설정 (@pyspark_task)
spark.executor.memory                        2g
# Java 직렬화 사용 (Kryo는 원격 Driver에서 EOFException 발생)
# spark.serializer                             org.apache.spark.serializer.KryoSerializer

# S3A(MinIO) 설정
spark.hadoop.fs.s3a.endpoint                 http://minio:9000
spark.hadoop.fs.s3a.impl                     org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.path.style.access        true
spark.hadoop.fs.s3a.connection.ssl.enabled   false
spark.hadoop.fs.s3a.aws.credentials.provider com.amazonaws.auth.EnvironmentVariableCredentialsProvider
spark.hadoop.fs.s3a.connection.maximum       200
spark.hadoop.fs.s3a.threads.max              200
spark.hadoop.fs.s3a.fast.upload              true
spark.hadoop.fs.s3a.fast.upload.buffer       disk
spark.hadoop.fs.s3a.committer.name           directory
spark.hadoop.fs.s3a.committer.staging.conflict-mode replace

# Parquet/Snappy
spark.sql.parquet.compression.codec          zstd
spark.sql.parquet.filterPushdown             true
spark.sql.parquet.mergeSchema                false
