services:
  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
      args:
        SPARK_VERSION: ${SPARK_VERSION}
        HADOOP_VERSION: ${HADOOP_VERSION}
        HADOOP_AWS_VERSION: ${HADOOP_AWS_VERSION}
        AWS_SDK_VERSION: ${AWS_SDK_VERSION}
    container_name: spark-master
    hostname: ${SPARK_MASTER_HOST}
    environment:
      - SPARK_NO_DAEMONIZE=true
      - PYTHONPATH=/opt/gharchive
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=${MINIO_REGION}
    command: [ "/bin/bash", "-c", "/opt/spark/sbin/start-master.sh --host ${SPARK_MASTER_HOST} --port ${SPARK_MASTER_PORT} --webui-port ${SPARK_MASTER_WEBUI}" ]
    ports:
      - "${SPARK_MASTER_PORT}:${SPARK_MASTER_PORT}"
      - "${SPARK_MASTER_WEBUI}:${SPARK_MASTER_WEBUI}"
      # 실시간 Spark UI(Driver) 포트 범위 (spark-submit을 spark-master 컨테이너에서 실행하는 client 모드 기준)
      - "4040-4050:4040-4050"
    volumes:
      - spark-event-logs:/opt/spark/event-logs
      - spark-warehouse:/opt/spark/warehouse
      - ./jobs:/opt/gharchive/jobs
      - ./docker/spark/conf:/opt/spark/conf
    networks:
      - gh-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${SPARK_MASTER_WEBUI}" ]
      interval: 30s
      timeout: 10s
      retries: 5

  spark-worker-1:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
      args:
        SPARK_VERSION: ${SPARK_VERSION}
        HADOOP_VERSION: ${HADOOP_VERSION}
        HADOOP_AWS_VERSION: ${HADOOP_AWS_VERSION}
        AWS_SDK_VERSION: ${AWS_SDK_VERSION}
    depends_on:
      spark-master:
        condition: service_healthy
    container_name: spark-worker-1
    hostname: spark-worker-1
    environment:
      - SPARK_NO_DAEMONIZE=true
      - PYTHONPATH=/opt/gharchive
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=${MINIO_REGION}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY}
      - SPARK_WORKER_WEBUI=8081
    command: [ "/bin/bash", "-c", "/opt/spark/sbin/start-worker.sh --webui-port $$SPARK_WORKER_WEBUI spark://${SPARK_MASTER_HOST}:${SPARK_MASTER_PORT}" ]
    ports:
      - "8081:8081"
    volumes:
      - spark-event-logs:/opt/spark/event-logs
      - spark-warehouse:/opt/spark/warehouse
      - ./jobs:/opt/gharchive/jobs
      - ./docker/spark/conf:/opt/spark/conf
    networks:
      - gh-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081" ]
      interval: 30s
      timeout: 10s
      retries: 5

  spark-worker-2:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
      args:
        SPARK_VERSION: ${SPARK_VERSION}
        HADOOP_VERSION: ${HADOOP_VERSION}
        HADOOP_AWS_VERSION: ${HADOOP_AWS_VERSION}
        AWS_SDK_VERSION: ${AWS_SDK_VERSION}
    depends_on:
      spark-master:
        condition: service_healthy
    container_name: spark-worker-2
    hostname: spark-worker-2
    environment:
      - SPARK_NO_DAEMONIZE=true
      - PYTHONPATH=/opt/gharchive
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=${MINIO_REGION}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY}
      - SPARK_WORKER_WEBUI=8082
    command: [ "/bin/bash", "-c", "/opt/spark/sbin/start-worker.sh --webui-port $$SPARK_WORKER_WEBUI spark://${SPARK_MASTER_HOST}:${SPARK_MASTER_PORT}" ]
    ports:
      - "8082:8082"
    volumes:
      - spark-event-logs:/opt/spark/event-logs
      - spark-warehouse:/opt/spark/warehouse
      - ./jobs:/opt/gharchive/jobs
      - ./docker/spark/conf:/opt/spark/conf
    networks:
      - gh-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082" ]
      interval: 30s
      timeout: 10s
      retries: 5

  spark-worker-3:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
      args:
        SPARK_VERSION: ${SPARK_VERSION}
        HADOOP_VERSION: ${HADOOP_VERSION}
        HADOOP_AWS_VERSION: ${HADOOP_AWS_VERSION}
        AWS_SDK_VERSION: ${AWS_SDK_VERSION}
    depends_on:
      spark-master:
        condition: service_healthy
    container_name: spark-worker-3
    hostname: spark-worker-3
    environment:
      - SPARK_NO_DAEMONIZE=true
      - PYTHONPATH=/opt/gharchive
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=${MINIO_REGION}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY}
      - SPARK_WORKER_WEBUI=8083
    command: [ "/bin/bash", "-c", "/opt/spark/sbin/start-worker.sh --webui-port $$SPARK_WORKER_WEBUI spark://${SPARK_MASTER_HOST}:${SPARK_MASTER_PORT}" ]
    ports:
      - "8083:8083"
    volumes:
      - spark-event-logs:/opt/spark/event-logs
      - spark-warehouse:/opt/spark/warehouse
      - ./jobs:/opt/gharchive/jobs
      - ./docker/spark/conf:/opt/spark/conf
    networks:
      - gh-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8083" ]
      interval: 30s
      timeout: 10s
      retries: 5

  spark-history-server:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
      args:
        SPARK_VERSION: ${SPARK_VERSION}
        HADOOP_VERSION: ${HADOOP_VERSION}
        HADOOP_AWS_VERSION: ${HADOOP_AWS_VERSION}
        AWS_SDK_VERSION: ${AWS_SDK_VERSION}
    depends_on:
      spark-master:
        condition: service_started
    container_name: spark-history-server
    hostname: spark-history-server
    environment:
      - SPARK_NO_DAEMONIZE=true
      - PYTHONPATH=/opt/gharchive
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=${MINIO_REGION}
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=file:///opt/spark/event-logs -Dspark.history.ui.port=${SPARK_HISTORY_PORT}
    command: [ "/bin/bash", "-c", "/opt/spark/sbin/start-history-server.sh" ]
    ports:
      - "${SPARK_HISTORY_PORT}:${SPARK_HISTORY_PORT}"
    volumes:
      - spark-event-logs:/opt/spark/event-logs
      - ./jobs:/opt/gharchive/jobs
      - ./docker/spark/conf:/opt/spark/conf
    networks:
      - gh-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${SPARK_HISTORY_PORT}" ]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: quay.io/minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: minio
    hostname: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    ports:
      - "${MINIO_PORT}:${MINIO_PORT}"
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}"
    volumes:
      - minio-data:/data
    networks:
      - gh-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${MINIO_PORT}/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============ apache airflow ============
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    hostname: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    networks:
      - gh-net
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: ./docker/airflow
    container_name: airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        echo "Airflow 초기화 완료"
    networks:
      - gh-net

  airflow-webserver:
    build:
      context: ./docker/airflow
    container_name: airflow-webserver
    hostname: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=true
      - PYTHONPATH=/opt/gharchive
      - S3_ENDPOINT=http://minio:9000
      - MINIO_REGION=${MINIO_REGION}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - SPARK_IMAGE=${SPARK_IMAGE}
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}
    command: webserver
    ports:
      - "8088:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./jobs:/opt/gharchive/jobs
      - ./docker/spark/conf:/opt/spark/conf
    networks:
      - gh-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    build:
      context: ./docker/airflow
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    # Docker 그룹 권한 추가 (DockerOperator 사용을 위해)
    group_add:
      - "${DOCKER_GID}"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - PYTHONPATH=/opt/gharchive
      - S3_ENDPOINT=http://minio:9000
      - MINIO_REGION=${MINIO_REGION}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - SPARK_IMAGE=${SPARK_IMAGE}
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}
    command: scheduler
    ports:
      # Spark Driver 통신 포트
      - "5041:5041"
      - "5042:5042"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./jobs:/opt/gharchive/jobs
      - ./docker/spark/conf:/opt/spark/conf
      # DockerOperator 사용을 위한 Docker 소켓 마운트
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gh-net
    healthcheck:
      test: [ "CMD", "airflow", "jobs", "check", "--local" ]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  gh-net:
    driver: bridge

volumes:
  minio-data:
  spark-event-logs:
  spark-warehouse:
  airflow-postgres-data:
